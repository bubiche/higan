<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Higan</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #07080d;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; color: #aeb6c8; }
      /* Playfield on the left, status panel on the right — the Touhou layout. */
      #stage { display: flex; align-items: flex-start; justify-content: center;
        gap: 16px; min-height: 100%; padding: 16px; box-sizing: border-box; }
      #field { position: relative; }
      /* 4:3-ish portrait playfield (384x448 sim units), scaled up for display. */
      canvas { display: block; background: #02030a; image-rendering: pixelated;
        box-shadow: 0 0 0 1px #1c2233, 0 0 40px #0a1430; }
      /* Per-screen DOM layer over the playfield. Each screen appends its OWN element
         here (never overwrites a shared node), so overlays stack: an Options menu
         pushed over a paused menu sits on top and pops away cleanly, leaving the menu
         beneath untouched. Keyboard-only, so pointer-events pass through to the field. */
      #overlay { position: absolute; inset: 0; pointer-events: none; }
      /* A full-field menu/result screen. Its backdrop dims whatever is beneath —
         the frozen playfield (pause) or the menu under it (options over pause). */
      .menu-screen { position: absolute; inset: 0; display: flex;
        align-items: center; justify-content: center; text-align: center;
        background: rgba(4, 6, 12, 0.72); }
      .menu-card h1 { margin: 0 0 14px; font-size: 34px; letter-spacing: 6px;
        font-weight: 700; color: #e7edff; text-shadow: 0 0 24px #2a52d0; }
      .menu-list { display: inline-flex; flex-direction: column; gap: 6px;
        margin: 8px 0 16px; min-width: 240px; }
      .menu-item { display: flex; justify-content: space-between; gap: 18px;
        padding: 4px 12px; border-radius: 4px; color: #8d97ac; white-space: pre; }
      .menu-item.sel { color: #e7edff; background: #16203a;
        box-shadow: inset 0 0 0 1px #2a3a66; }
      .menu-value { color: #cdd6ea; }
      .menu-hint { margin: 0; opacity: 0.7; }
      .menu-hint b { color: #cdd6ea; }
      /* Character-select: a name list beside a portrait/info pane (reuses .menu-screen's
         dimmed backdrop and .menu-hint footer). The pane is accented per shot type via a
         --accent CSS var the screen sets from the character's shot colour. */
      .char-card { text-align: center; }
      .char-card h1 { margin: 0 0 14px; font-size: 34px; letter-spacing: 6px;
        font-weight: 700; color: #e7edff; text-shadow: 0 0 24px #2a52d0; }
      /* Sized to fit the field even at the 1.0× minimum display scale (a 384px-wide
         overlay): list(110) + gap(16) + pane(150+24+2) ≈ 302px, comfortably inside. */
      .char-body { display: flex; gap: 16px; align-items: stretch;
        justify-content: center; margin: 8px 0 16px; }
      .char-list { display: flex; flex-direction: column; gap: 6px;
        justify-content: center; min-width: 110px; text-align: left; }
      .char-name { padding: 4px 10px; border-radius: 4px; color: #8d97ac;
        white-space: pre; }
      .char-name.sel { color: #e7edff; background: #16203a;
        box-shadow: inset 0 0 0 1px #2a3a66; }
      .char-name.locked { color: #5a6076; font-style: italic; }
      .char-pane { width: 150px; padding: 12px; border-radius: 6px;
        background: #0c1120; border: 1px solid var(--accent, #2a3346);
        box-shadow: 0 0 20px -6px var(--accent, transparent);
        display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .char-portrait { width: 88px; height: 88px; object-fit: contain;
        object-position: bottom; filter: drop-shadow(0 0 8px var(--accent, transparent)); }
      .char-info { width: 100%; text-align: center; }
      .char-pane-name { font-size: 16px; font-weight: 700; color: var(--accent, #e7edff);
        letter-spacing: 1px; }
      .char-pane-blurb { margin: 4px 0 8px; color: #aeb6c8; line-height: 1.4; }
      .char-pane-stat { display: flex; justify-content: space-between; gap: 10px;
        padding: 2px 0; color: #cdd6ea; border-top: 1px solid #1c2233; }
      .char-pane-stat span { color: #7c8398; }
      /* Records: the hi-score grid viewer (reuses .menu-screen's dimmed backdrop and the
         .menu-hint footer). A compact font + tight cells keep the whole character×difficulty
         grid inside the field at the 1.0× minimum scale for realistic scores (the field is only
         384px wide there). overflow-x is a LAST-RESORT safety, not the plan: this UI is
         keyboard-only, so nothing drives the scrollbar — a runaway score width would push the
         far columns out of reach at 1.0× (they stay visible at the 1.6× default). Keep scores
         readable without scrolling by keeping the grid narrow. */
      .records-card { text-align: center; max-width: 100%; }
      .records-card h1 { margin: 0 0 14px; font-size: 34px; letter-spacing: 6px;
        font-weight: 700; color: #e7edff; text-shadow: 0 0 24px #2a52d0; }
      .records-scroll { max-width: 100%; overflow-x: auto; margin: 8px 0 16px; }
      .records-table { border-collapse: collapse; margin: 0 auto; font-size: 10px;
        white-space: nowrap; }
      .records-table th, .records-table td { padding: 3px 6px;
        border: 1px solid #1c2233; }
      .records-table thead th { color: #7c8398; font-weight: 400; }
      .records-table thead th:first-child { border: none; }
      .records-row-head { text-align: left; color: #cdd6ea; }
      .records-row-head.locked { color: #5a6076; font-style: italic; }
      .records-table td { text-align: right; color: #e7edff; }
      /* Ending staff-roll: a credits column scrolled bottom-to-top, clipped to the field
         and drawn over the dimmed frozen playfield. The in-game screen's `.menu-screen`
         backdrop is reused; the inner column is translated upward each frame in JS. */
      .ending-roll { position: absolute; inset: 0; overflow: hidden; }
      .ending-inner { position: absolute; left: 0; right: 0; display: flex;
        flex-direction: column; align-items: center; gap: 8px;
        padding: 0 24px; box-sizing: border-box; will-change: transform; }
      .ending-inner h1 { margin: 0 0 18px; font-size: 30px; letter-spacing: 6px;
        font-weight: 700; color: #e7edff; text-shadow: 0 0 24px #2a52d0; }
      .ending-inner p { margin: 0; color: #aeb6c8; }
      .ending-fin { margin-top: 22px; color: #cdd6ea; }
      .ending-end { margin-top: 10px; font-size: 20px; letter-spacing: 8px;
        color: #e7edff; text-shadow: 0 0 18px #2a52d0; }
      .ending-skip { position: absolute; left: 0; right: 0; bottom: 14px;
        text-align: center; }
      /* Side HUD + replay controls — built by the in-game screen into this panel. */
      #sidebar { width: 230px; display: flex; flex-direction: column; gap: 14px; }
      #hud { white-space: pre; text-shadow: 0 1px 2px #000; }
      #replay-controls { display: flex; flex-direction: column; gap: 6px;
        border-top: 1px solid #1c2233; padding-top: 12px; }
      #replay-controls button { font: inherit; text-align: left; cursor: pointer;
        color: #cdd6ea; background: #11151f; border: 1px solid #2a3346;
        border-radius: 4px; padding: 6px 9px; }
      #replay-controls button:hover { background: #182030; border-color: #3a4660; }
      /* Static controls reference along the bottom. */
      #controls-hint { margin: 0; padding: 4px 16px 14px; text-align: center;
        opacity: 0.5; text-shadow: 0 1px 2px #000; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="field">
        <canvas id="playfield"></canvas>
        <div id="overlay"></div>
      </div>
      <aside id="sidebar"></aside>
    </div>
    <p id="controls-hint">
      move: arrows/WASD · shoot: Z · bomb: X · focus: shift · esc: pause
      &nbsp;—&nbsp; space: debug-pause · .: step · ,: back · 1/2/3: speed
      &nbsp;—&nbsp; menus: ↑/↓ select · ←/→ adjust · Z/Enter: confirm
    </p>
    <script type="module" src="/games/demo/main.ts"></script>
  </body>
</html>
